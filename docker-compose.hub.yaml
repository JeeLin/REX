services:
  hub:
    image: ghcr.io/${GITHUB_REPO_OWNER}/rex-hub:latest
    container_name: rex-hub
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - hub-data:/app/data
    environment:
      - REX_SECRET_KEY=${REX_SECRET_KEY}
      - DATA_DIR=/app/data

volumes:
  hub-data:
    driver: local
