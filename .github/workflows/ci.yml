name: CI

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  HUB_IMAGE: ghcr.io/${{ github.repository_owner }}/rex-hub
  AGENT_IMAGE: ghcr.io/${{ github.repository_owner }}/rex-agent

jobs:
  # ── Rust 检查（fmt + clippy + test） ──────────────────
  check-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets
      - run: cargo test --workspace

  # ── 前端检查（type-check + lint + build） ─────────────
  check-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: packages/rex-console-web
      - run: bun run type-check
        working-directory: packages/rex-console-web
      - run: bun run lint
        working-directory: packages/rex-console-web

  # ── 构建 Agent 二进制（全平台矩阵） ──────────────────
  # 产物用于：Docker Hub 镜像内嵌 + Release 发布
  build-agent:
    needs: [check-rust]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch: linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            arch: mac-amd64
          - target: aarch64-apple-darwin
            os: macos-14
            arch: mac-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: cargo build --release -p rex-agent --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - uses: actions/upload-artifact@v6
        with:
          name: agent-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/rex-agent*

  # ── 构建 Hub 二进制（全平台矩阵） ────────────────────
  # 产物用于：Docker Hub 镜像内嵌 + Release 发布
  build-hub:
    needs: [check-rust, build-frontend]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch: linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            arch: mac-amd64
          - target: aarch64-apple-darwin
            os: macos-14
            arch: mac-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: cargo build --release -p rex-hub --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - uses: actions/upload-artifact@v6
        with:
          name: hub-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/rex-hub*

  # ── 构建前端 ──────────
  build-frontend:
    needs: [check-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: packages/rex-console-web
      - run: bun run build
        working-directory: packages/rex-console-web
      - uses: actions/upload-artifact@v6
        with:
          name: frontend
          path: packages/rex-console-web/dist/

  # ── Docker: Hub 镜像（包含所有平台 Agent 二进制） ─────
  docker-hub:
    needs: [build-hub, build-frontend, build-agent]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download hub binary (linux-amd64)
        uses: actions/download-artifact@v8
        with:
          name: hub-linux-amd64
          path: dist/

      - name: Download frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend
          path: dist/static/

      - name: Download all agent binaries
        uses: actions/download-artifact@v8
        with:
          pattern: agent-*
          path: dist/agents-tmp/
          merge-multiple: false

      - name: Organize agent binaries
        run: |
          for dir in dist/agents-tmp/agent-*/; do
            arch=$(basename "$dir" | sed 's/^agent-//')
            mkdir -p "dist/agents/$arch"
            cp "$dir"/rex-agent* "dist/agents/$arch/"
          done
          rm -rf dist/agents-tmp
          chmod +x dist/agents/*/rex-agent

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.HUB_IMAGE }}
          tags: type=ref,event=tag

      - name: Build and push Hub image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.hub
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker: Agent 镜像（linux/amd64 + linux/arm64） ───
  docker-agent:
    needs: [check-rust, check-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare agent README for Docker Hub
        run: cp docs/agent-readme.md README.md

      - name: Docker meta
        id: meta-agent
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: type=ref,event=tag

      - name: Build and push Agent image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release: Hub + Agent 二进制 zip + SHA256SUMS ─────
  release:
    needs: [build-agent, build-hub]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all agent binaries
        uses: actions/download-artifact@v8
        with:
          pattern: agent-*
          path: artifacts/
          merge-multiple: false

      - name: Download all hub binaries
        uses: actions/download-artifact@v8
        with:
          pattern: hub-*
          path: artifacts/
          merge-multiple: false

      - name: Create zip packages
        run: |
          for dir in artifacts/agent-*/; do
            arch=$(basename "$dir" | sed 's/^agent-//')
            (cd "$dir" && zip -j "../../rex-agent-${arch}.zip" rex-agent*)
          done
          for dir in artifacts/hub-*/; do
            arch=$(basename "$dir" | sed 's/^hub-//')
            (cd "$dir" && zip -j "../../rex-hub-${arch}.zip" rex-hub*)
          done

      - name: Generate SHA256SUMS
        run: |
          sha256sum rex-hub-*.zip rex-agent-*.zip > SHA256SUMS

      - name: Extract changelog for release
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Extract section between ## [VERSION] and next ## [
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release-body.md
          # Ensure non-empty
          if [ ! -s release-body.md ]; then
            echo "No changelog entry for v${VERSION}" > release-body.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-body.md
          files: rex-hub-*.zip rex-agent-*.zip SHA256SUMS
