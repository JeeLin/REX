<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>REX Hub — 登录</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-xl);
      background: var(--bg-deep);
      position: relative;
      overflow: hidden;
    }

    /* Ambient CRT scanline effect — phosphor-enhanced */
    .login-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.04) 2px,
        rgba(0, 0, 0, 0.04) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    .login-page::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(
        ellipse at 50% 70%,
        rgba(232, 145, 45, 0.06) 0%,
        transparent 50%
      );
      pointer-events: none;
      animation: ambientPulse 6s ease-in-out infinite alternate;
    }

    @keyframes ambientPulse {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }

    .login-container {
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 2;
    }

    .login-brand {
      text-align: center;
      margin-bottom: var(--sp-3xl);
    }

    .login-logo {
      width: 56px;
      height: 56px;
      background: var(--accent);
      border-radius: var(--radius-xl);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: var(--fs-2xl);
      color: #000;
      margin-bottom: var(--sp-lg);
      box-shadow: 0 0 24px var(--accent-glow), 0 0 60px rgba(232, 145, 45, 0.12);
    }

    .login-title {
      font-family: var(--font-mono);
      font-size: var(--fs-2xl);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -1px;
    }

    .login-subtitle {
      font-size: var(--fs-base);
      color: var(--text-secondary);
      margin-top: var(--sp-sm);
    }

    .login-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--sp-2xl);
      box-shadow: var(--phosphor-shadow);
      transition: border-color var(--transition-base);
    }
    .login-card:focus-within {
      border-color: rgba(232, 145, 45, 0.2);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--sp-lg);
    }

    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      font-size: var(--fs-sm);
      color: var(--text-secondary);
      cursor: pointer;
    }

    .checkbox-label input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
    }

    .forgot-link {
      font-size: var(--fs-sm);
      color: var(--accent);
    }

    .login-btn {
      width: 100%;
      height: 42px;
      font-size: var(--fs-md);
    }

    .login-footer {
      text-align: center;
      margin-top: var(--sp-2xl);
      font-size: var(--fs-sm);
      color: var(--text-muted);
    }

    .login-footer .version {
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    /* Mobile */
    @media (max-width: 767px) {
      .login-container { max-width: 100%; }
      .login-card { padding: var(--sp-xl); }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-brand">
        <div class="login-logo">R</div>
        <h1 class="login-title">REX Hub</h1>
        <p class="login-subtitle">管理你的远程基础设施</p>
      </div>

      <div class="login-card">
        <form class="login-form" onsubmit="return handleLogin(event)">
          <div class="form-group">
            <label class="form-label" for="username">用户名</label>
            <input class="form-input" type="text" id="username" placeholder="输入用户名" autocomplete="username" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">密码</label>
            <input class="form-input" type="password" id="password" placeholder="输入密码" autocomplete="current-password" required>
          </div>

          <div class="remember-row">
            <label class="checkbox-label">
              <input type="checkbox" checked> 记住我
            </label>
            <a href="#" class="forgot-link">忘记密码？</a>
          </div>

          <button type="submit" class="btn btn-primary login-btn">登录</button>
        </form>
      </div>

      <div class="login-footer">
        <span class="version">REX Hub v0.1</span> · 自托管
      </div>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
